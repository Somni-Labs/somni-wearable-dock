apiVersion: batch/v1
kind: Job
metadata:
  name: slice-all-fixed
  namespace: utilities
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: slicer
        image: cznewt/prusa-slicer:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          echo "=== PrusaSlicer — All 4 Parts (with gcode validation) ==="

          SLICER=/prusa-slicer/prusa-slicer
          INI=/tmp/pla_plus.ini
          MOONRAKER="http://192.168.1.15:7125"

          cat > "$INI" << 'PROFILE'
          # --- Print settings ---
          layer_height = 0.3
          first_layer_height = 0.35
          perimeters = 3
          top_solid_layers = 5
          bottom_solid_layers = 4
          fill_density = 20%
          fill_pattern = gyroid
          external_perimeter_speed = 40
          infill_speed = 60
          travel_speed = 150
          bridge_speed = 25
          support_material = 1
          support_material_auto = 1
          support_material_spacing = 2
          support_material_angle = 0
          skirts = 2
          skirt_distance = 5
          brim_width = 0

          # --- Filament settings (PLA+) ---
          temperature = 215
          first_layer_temperature = 220
          bed_temperature = 60
          first_layer_bed_temperature = 65
          fan_always_on = 1
          min_fan_speed = 100
          max_fan_speed = 100
          bridge_fan_speed = 100

          # --- Printer settings (QIDI Q2) ---
          gcode_flavor = klipper
          bed_shape = 0x0,275x0,275x295,0x295
          max_print_height = 265
          nozzle_diameter = 0.4
          retract_length = 0.8
          retract_speed = 40
          retract_lift = 0.2
          start_gcode = G28\nG1 Z5 F5000
          end_gcode = M400\nG91\nG1 E-5 F2700\nG1 Z10 F3000\nG90\nG1 X10 Y270 F6000\nM400\nM140 S0\nM104 S0\nM106 S0\nG4 P2000\nM84
          PROFILE

          sed -i 's/^[[:space:]]*//' "$INI"

          validate_gcode() {
            local FILE="$1"
            local REQUIRE_SUPPORTS="${2:-}"
            local ERRORS=0

            echo "  Validating $FILE..."

            # Check 1: Bed temperature — M140 or M190 with target >= 55
            local BED_TEMP
            BED_TEMP=$(grep -E '^M1[49]0 S[0-9]+' "$FILE" | sed 's/.*S\([0-9]*\).*/\1/' | head -1)
            if [ -z "$BED_TEMP" ] || [ "$BED_TEMP" -lt 55 ]; then
              echo "  FAIL: Bed temperature missing or too low (got: ${BED_TEMP:-none}, need >= 55)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: Bed temperature = ${BED_TEMP}C"
            fi

            # Check 2: Extruder temperature — M104 or M109 with target >= 210
            local EXT_TEMP
            EXT_TEMP=$(grep -E '^M10[49] S[0-9]+' "$FILE" | sed 's/.*S\([0-9]*\).*/\1/' | sort -n | tail -1)
            if [ -z "$EXT_TEMP" ] || [ "$EXT_TEMP" -lt 210 ]; then
              echo "  FAIL: Extruder temperature missing or too low (got: ${EXT_TEMP:-none}, need >= 210)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: Extruder temperature = ${EXT_TEMP}C"
            fi

            # Check 3: Support material (conditional)
            if [ "$REQUIRE_SUPPORTS" = "--require-supports" ]; then
              local SUPPORT_LINES
              SUPPORT_LINES=$(grep -c ';TYPE:Support' "$FILE" || true)
              if [ "$SUPPORT_LINES" -eq 0 ]; then
                echo "  FAIL: No support material found (;TYPE:Support missing)"
                ERRORS=$((ERRORS + 1))
              else
                echo "  OK: Support material present ($SUPPORT_LINES sections)"
              fi
            fi

            # Check 4: Layer count sanity (> 3 layers — catches empty/corrupt files
            # but allows thin parts like the 2mm iPad cover plate)
            local LAYER_COUNT
            LAYER_COUNT=$(grep -c ';LAYER_CHANGE' "$FILE" || true)
            if [ "$LAYER_COUNT" -lt 3 ]; then
              echo "  FAIL: Only $LAYER_COUNT layers — file may be corrupt or empty"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: $LAYER_COUNT layers"
            fi

            # Check 5: Coordinate bounds (X <= 275, Y <= 295)
            # Uses POSIX-compatible awk (no GNU match() capture groups)
            local X_MAX Y_MAX
            X_MAX=$(awk -F'X' '/^G1 .*X[0-9]/ { split($2, a, " "); if (a[1]+0 > max) max=a[1]+0 } END { printf "%.1f", max }' "$FILE")
            Y_MAX=$(awk -F'Y' '/^G1 .*Y[0-9]/ { split($2, a, " "); if (a[1]+0 > max) max=a[1]+0 } END { printf "%.1f", max }' "$FILE")
            if [ "$(awk "BEGIN { print ($X_MAX > 275) }")" -eq 1 ]; then
              echo "  FAIL: X coordinate out of bounds (max X = ${X_MAX}, limit 275)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: X max = ${X_MAX} (limit 275)"
            fi
            if [ "$(awk "BEGIN { print ($Y_MAX > 295) }")" -eq 1 ]; then
              echo "  FAIL: Y coordinate out of bounds (max Y = ${Y_MAX}, limit 295)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: Y max = ${Y_MAX} (limit 295)"
            fi

            if [ "$ERRORS" -gt 0 ]; then
              echo "  ABORT: $ERRORS validation error(s) in $FILE"
              exit 1
            fi
            echo "  PASS: All checks passed for $FILE"
          }

          # ── BOTTOM TRAY ──
          echo "--- Slicing bottom tray ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/bottom.gcode --export-gcode /tmp/input-bottom/bottom-tray.stl
          validate_gcode /tmp/bottom.gcode
          upload_gcode() {
            local FILE="$1"
            local FILENAME="$2"
            echo "--- Uploading $FILENAME ---"
            curl -s -X DELETE "$MOONRAKER/server/files/gcodes/$FILENAME" || true
            sleep 5
            for ATTEMPT in 1 2 3; do
              RESULT=$(curl -s -X POST "$MOONRAKER/server/files/upload" \
                -F "file=@$FILE;filename=$FILENAME" \
                -F "root=gcodes")
              if echo "$RESULT" | grep -q '"error"'; then
                echo "  Upload attempt $ATTEMPT failed, retrying in 5s..."
                sleep 5
              else
                echo "  Upload result: $RESULT"
                return 0
              fi
            done
            echo "  ERROR: All upload attempts failed for $FILENAME"
            return 1
          }

          upload_gcode /tmp/bottom.gcode v1-charging-stand-bottom-tray.gcode
          echo ""

          # ── TOP TRAY ──
          echo "--- Slicing top tray ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/top.gcode --export-gcode /tmp/input-top/top-tray.stl
          validate_gcode /tmp/top.gcode
          upload_gcode /tmp/top.gcode v1-charging-stand-top-tray.gcode
          echo ""

          # ── IPAD COVER ──
          echo "--- Slicing iPad cover ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/cover.gcode --export-gcode /tmp/input-cover/ipad-cover.stl
          validate_gcode /tmp/cover.gcode
          upload_gcode /tmp/cover.gcode v1-charging-stand-ipad-cover.gcode
          echo ""

          # ── MUDRA POLE ──
          echo "--- Slicing mudra pole ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/pole.gcode --export-gcode /tmp/input-pole/mudra-pole.stl
          validate_gcode /tmp/pole.gcode
          upload_gcode /tmp/pole.gcode v1-charging-stand-mudra-pole.gcode
          echo ""

          echo "=== All done ==="
        volumeMounts:
        - name: input-bottom
          mountPath: /tmp/input-bottom
        - name: input-top
          mountPath: /tmp/input-top
        - name: input-cover
          mountPath: /tmp/input-cover
        - name: input-pole
          mountPath: /tmp/input-pole
      volumes:
      - name: input-bottom
        configMap:
          name: slicer-stl-input
      - name: input-top
        configMap:
          name: slicer-stl-input-top
      - name: input-cover
        configMap:
          name: slicer-stl-input-ipad-cover
      - name: input-pole
        configMap:
          name: slicer-stl-input-mudra-pole
