apiVersion: batch/v1
kind: Job
metadata:
  name: slice-all-fixed
  namespace: utilities
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: slicer
        image: cznewt/prusa-slicer:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          echo "=== PrusaSlicer — All 3 Parts (with temp post-processing) ==="

          SLICER=/prusa-slicer/prusa-slicer
          INI=/tmp/pla_plus.ini
          MOONRAKER="http://192.168.1.15:7125"

          cat > "$INI" << 'PROFILE'
          [print:PLA+]
          layer_height = 0.2
          first_layer_height = 0.25
          perimeters = 3
          top_solid_layers = 5
          bottom_solid_layers = 4
          fill_density = 20%
          fill_pattern = gyroid
          external_perimeter_speed = 40
          infill_speed = 60
          travel_speed = 150
          bridge_speed = 25
          support_material = 1
          support_material_auto = 1
          support_material_spacing = 2
          support_material_angle = 0
          skirts = 2
          skirt_distance = 5
          brim_width = 0

          [filament:PLA+]
          temperature = 215
          first_layer_temperature = 220
          bed_temperature = 60
          first_layer_bed_temperature = 65
          fan_always_on = 1
          min_fan_speed = 100
          max_fan_speed = 100
          bridge_fan_speed = 100

          [printer:QIDI_Q2]
          gcode_flavor = klipper
          bed_shape = 0x0,275x0,275x295,0x295
          max_print_height = 265
          nozzle_diameter = 0.4
          retract_length = 0.8
          retract_speed = 40
          retract_lift = 0.2
          start_gcode = G28\nG1 Z5 F5000
          end_gcode = END_PRINT
          PROFILE

          sed -i 's/^[[:space:]]*//' "$INI"

          fix_temps() {
            local FILE="$1"
            echo "  Post-processing temps in $FILE"
            # Replace M104 S200 with bed preheat + extruder at 220 (first layer)
            sed -i 's/^M104 S200 ; set temperature/M140 S65 ; bed temp (first layer)\nM104 S220 ; extruder temp (first layer)/' "$FILE"
            # Replace M109 S200 with bed wait + extruder wait
            sed -i 's/^M109 S200 ; set temperature and wait for it to be reached/M190 S65 ; wait for bed temp\nM109 S220 ; wait for extruder temp (first layer)/' "$FILE"
            # After first layer, PrusaSlicer may emit M104 S200 for subsequent layers
            # Change those to 215 (normal print temp after first layer)
            # But only the ones that appear AFTER line 30 (skip the start block)
            sed -i '30,$ s/^M104 S200$/M104 S215 ; print temp/' "$FILE"
            echo "  Temp lines after fix:"
            head -25 "$FILE" | grep -E "(M104|M109|M140|M190)" || echo "  NONE"
          }

          # ── BOTTOM TRAY ──
          echo "--- Slicing bottom tray ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/bottom.gcode --export-gcode /tmp/input-bottom/bottom-tray.stl
          fix_temps /tmp/bottom.gcode
          echo "--- Uploading bottom tray ---"
          curl -s -X DELETE "$MOONRAKER/server/files/gcodes/v1-charging-stand-bottom-tray.gcode" || true
          sleep 2
          curl -s -X POST "$MOONRAKER/server/files/upload" \
            -F "file=@/tmp/bottom.gcode;filename=v1-charging-stand-bottom-tray.gcode" \
            -F "root=gcodes"
          echo ""

          # ── TOP TRAY ──
          echo "--- Slicing top tray ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/top.gcode --export-gcode /tmp/input-top/top-tray.stl
          fix_temps /tmp/top.gcode
          echo "--- Uploading top tray ---"
          curl -s -X DELETE "$MOONRAKER/server/files/gcodes/v1-charging-stand-top-tray.gcode" || true
          sleep 2
          curl -s -X POST "$MOONRAKER/server/files/upload" \
            -F "file=@/tmp/top.gcode;filename=v1-charging-stand-top-tray.gcode" \
            -F "root=gcodes"
          echo ""

          # ── IPAD COVER ──
          echo "--- Slicing iPad cover ---"
          $SLICER --load "$INI" --center 137,147 \
            --output /tmp/cover.gcode --export-gcode /tmp/input-cover/ipad-cover.stl
          fix_temps /tmp/cover.gcode
          echo "--- Uploading iPad cover ---"
          curl -s -X DELETE "$MOONRAKER/server/files/gcodes/v1-charging-stand-ipad-cover.gcode" || true
          sleep 2
          curl -s -X POST "$MOONRAKER/server/files/upload" \
            -F "file=@/tmp/cover.gcode;filename=v1-charging-stand-ipad-cover.gcode" \
            -F "root=gcodes"
          echo ""

          echo "=== All done ==="
        volumeMounts:
        - name: input-bottom
          mountPath: /tmp/input-bottom
        - name: input-top
          mountPath: /tmp/input-top
        - name: input-cover
          mountPath: /tmp/input-cover
      volumes:
      - name: input-bottom
        configMap:
          name: slicer-stl-input
      - name: input-top
        configMap:
          name: slicer-stl-input-top
      - name: input-cover
        configMap:
          name: slicer-stl-input-ipad-cover
